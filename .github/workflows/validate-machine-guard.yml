name: Validate Machine Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  machine-guard:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect bootstrap placeholders
        id: detect
        shell: pwsh
        run: |
          $identity = Get-Content -LiteralPath .\CONFIG\project_identity.json -Raw
          if ($identity -match '\{\{') {
            "skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
          else {
            "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Run machine guard
        if: steps.detect.outputs.skip != 'true'
        shell: pwsh
        run: .\tools\check_machine_guard.ps1
